services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "3000"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME_PROD}
      DB_PORT: 3306
      WORKERS_API_URL: ${WORKERS_API_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    networks:
      - trabunda_net
  trabajadorapi:
    image: dramos/trabajadorapi:v1.0
    container_name: trabunda_trabajador
    restart: always
    ports:
      - "3001:3000"
    env_file:
      - .env
    networks:
      - trabunda_net
    depends_on:
      - db
  destajo-api:
    image: dramos/trabundaapi4destajo:v1.0
    container_name: trabunda_destajo
    restart: always
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      DATABASE: ${DB_NAME_EXTERNAL}
      USER_DB: ${DB_USER_EXTERNAL}
      PASSW_DB: ${DB_PASS_EXTERNAL}
      HOST_DB: ${DB_HOST_EXTERNAL}
      LOGGING_DB: "false"
      PORT: 3000
      NODE_ENV: "production"
      TZ: "America/Lima"
    networks:
      - trabunda_net
    depends_on:
      - db
  redis:
    image: redis:alpine
    command: ["redis-server","--requirepass","${REDIS_PASS}"]
    container_name: trabunda_redis
    env_file:
      - .env
    networks:
      - trabunda_net

  db:
    image: mysql:8
    container_name: trabunda_db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME_PROD}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    networks:
      - trabunda_net
    volumes:
      - db_data:/var/lib/mysql
networks:
  trabunda_net:
    driver: bridge
volumes:
  db_data: